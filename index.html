<!DOCTYPE html>
<html>
<head>
    <title>Redirect Button</title>
</head>
<body>

    <!-- This is the button the user clicks -->
    <button onclick="openInBlank()">Launch Website</button>

    <script>
        function openInBlank() {
            // 1. SET YOUR URL HERE
            var url = "https://www.wikipedia.org"; 
            
            // 2. Open a new window with 'about:blank'
            var win = window.open('about:blank', '_blank');
            
            // 3. Style the new window to be full screen
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            
            // 4. Create an iframe and point it to your URL
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.src = url;
            
            // 5. Add the iframe to the blank page
            win.document.body.appendChild(iframe);
        }
    </script>

</body>
</html>
