<script>
(function() {
    function openAboutBlank() {
        // Open a new empty window
        var win = window.open();
        if (!win) {
            alert("Please allow pop-ups for this site to work.");
            return;
        }

        // Get current URL (handles https:// and www. automatically)
        var url = window.location.href;
        
        // Create a full-screen iframe inside the new window
        var iframe = win.document.createElement('iframe');
        iframe.style.width = "100vw";
        iframe.style.height = "100vh";
        iframe.style.border = "none";
        iframe.style.position = "fixed";
        iframe.style.top = "0";
        iframe.style.left = "0";
        iframe.src = url;

        // Clean up margins and inject the iframe
        win.document.body.style.margin = "0";
        win.document.body.style.padding = "0";
        win.document.body.style.overflow = "hidden";
        win.document.body.appendChild(iframe);
    }

    // Google Sites requires a button click (user gesture) to open new windows
    document.write('<button onclick="openAboutBlank()" style="padding: 12px 24px; background: #4285F4; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: sans-serif;">Launch Cloaked Site</button>');
})();
</script>
